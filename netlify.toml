# Build frontend Vite depuis la racine du dépôt
# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

# favicon.ico = copie binaire de logo.png (PNG) : type explicite pour crawlers / navigateurs
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Content-Type = "image/png"

# Fichiers hashés Vite : cache long (le nom change à chaque build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
